name: Custom Image

on:
  push:
    branches:
      - ui-custom
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Override image tag (default: ui-custom)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve upstream release version
        id: upstream_version
        run: |
          set -euo pipefail
          VERSION_FALLBACK="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          API_URL="https://api.github.com/repos/Wei-Shaw/sub2api/releases/latest"
          VERSION="$(curl -fsSL "${API_URL}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')"
          if [ -z "${VERSION}" ]; then
            VERSION="${VERSION_FALLBACK}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        run: |
          REPO="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            PRIMARY_TAG="${{ github.event.inputs.image_tag }}"
          else
            PRIMARY_TAG="ui-custom"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.upstream_version.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.vars.outputs.build_date }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.primary_tag }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.upstream_version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
